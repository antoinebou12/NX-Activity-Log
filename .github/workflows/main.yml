name: Build and Release

on:
  push:
    branches: [master, main, hos-22-pr76]
  pull_request:
  issue_comment:
    types: [created]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/release-action'))

    steps:
      - name: Update latest libnx
        run: |
          git config --global --add safe.directory "*"
          git clone --recurse-submodules https://github.com/switchbrew/libnx.git
          cd libnx
          make install -j$(nproc)
        shell: bash
      - name: Checkout latest code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'issue_comment' && 'main' || github.ref }}
          clean: true
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
      - name: Setup ENV parameters
        id: version
        run: |
          VER_FILE=Application/Makefile
          VERSION=$(awk '/^VER_MAJOR/{print $3}' $VER_FILE).$(awk '/^VER_MINOR/{print $3}' $VER_FILE).$(awk '/^VER_MICRO/{print $3}' $VER_FILE)
          echo "tag=v${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_name=NX-Activity-Log v${VERSION}" >> "${GITHUB_OUTPUT}"
        shell: bash
      - name: Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          make -j$(nproc)
        shell: bash
      - name: Upload build artifact
        if: github.event_name != 'issue_comment'
        uses: actions/upload-artifact@v4
        with:
          name: NX-Activity-Log-${{ steps.version.outputs.tag }}
          path: ./sdcard/switch/NX-Activity-Log/NX-Activity-Log.nro
          if-no-files-found: error
      - name: Upload Release Asset
        if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/release-action')
        uses: softprops/action-gh-release@v2.0.9
        with:
          name: ${{ steps.version.outputs.release_name }}
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: yes
          make_latest: true
          files: |
            ./sdcard/switch/NX-Activity-Log/NX-Activity-Log.nro
